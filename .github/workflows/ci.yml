name: CI - Lint & Validate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-html:
    name: HTML Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install html5validator
        run: pip install html5validator

      - name: Validate HTML
        run: html5validator --root . --match "*.html" --show-warnings || true

  lint-css:
    name: CSS Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install stylelint
        run: npm install stylelint stylelint-config-standard

      - name: Create stylelint config
        run: echo '{"extends":"stylelint-config-standard"}' > .stylelintrc.json

      - name: Lint CSS
        run: npx stylelint "assets/css/**/*.css" --allow-empty-input || true

  lint-js:
    name: JavaScript Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install ESLint
        run: npm install eslint @eslint/js

      - name: Create ESLint config
        run: |
          cat > eslint.config.mjs << 'ESLINTEOF'
          import js from "@eslint/js";
          export default [
            js.configs.recommended,
            {
              languageOptions: {
                ecmaVersion: 2022,
                sourceType: "module",
                globals: {
                  window: "readonly",
                  document: "readonly",
                  localStorage: "readonly",
                  ScrollReveal: "readonly",
                  console: "readonly"
                }
              }
            }
          ];
          ESLINTEOF

      - name: Lint JavaScript
        run: npx eslint assets/js/ || true

  security-check:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for potential secrets..."
          if grep -rn "password\|secret\|api_key\|token" --include="*.js" --include="*.html" --include="*.css" . 2>/dev/null; then
            echo "::warning::Potential secrets found in codebase"
          else
            echo "No secrets detected"
          fi

      - name: Check for mixed content
        run: |
          echo "Checking for HTTP (non-HTTPS) links..."
          if grep -rn 'http://' --include="*.html" --include="*.css" --include="*.js" . 2>/dev/null | grep -v 'localhost\|127.0.0.1'; then
            echo "::warning::Found HTTP links - consider upgrading to HTTPS"
          else
            echo "All external links use HTTPS"
          fi
