name: CI - Lint & Validate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-html:
    name: HTML Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate HTML
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: .
          css: true

  lint-css:
    name: CSS Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install stylelint
        run: npm install -g stylelint stylelint-config-standard

      - name: Create stylelint config
        run: echo '{"extends":"stylelint-config-standard"}' > .stylelintrc.json

      - name: Lint CSS
        run: stylelint "assets/css/**/*.css" --allow-empty-input || true

  lint-js:
    name: JavaScript Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ESLint
        run: npm install -g eslint

      - name: Lint JavaScript
        run: npx eslint assets/js/ --no-eslintrc --env browser,es2021 || true

  security-headers:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for potential secrets..."
          if grep -rn "password\|secret\|api_key\|token" --include="*.js" --include="*.html" --include="*.css" .; then
            echo "::warning::Potential secrets found in codebase"
          else
            echo "No secrets detected"
          fi

      - name: Check for mixed content
        run: |
          echo "Checking for HTTP (non-HTTPS) links..."
          if grep -rn 'http://' --include="*.html" --include="*.css" --include="*.js" . | grep -v 'localhost\|127.0.0.1'; then
            echo "::warning::Found HTTP links - consider upgrading to HTTPS"
          else
            echo "All external links use HTTPS"
          fi
